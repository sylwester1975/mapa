<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Mapa S10 Płock 2026</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: white;
            text-align: center; /* Startowe wyśrodkowanie */
        }
        img {
            max-width: 100%;
            height: auto;
            display: inline-block;
            vertical-align: top;
            cursor: zoom-in;
        }
        img.zoomed {
            max-width: none;
            display: block;
            margin: 0;
            cursor: zoom-out;
        }
    </style>
</head>
<body>

    <img src="droga-s10-plock-2026.png" id="mapaS10" onclick="toggleZoom()">

    <script>
        function toggleZoom() {
            const img = document.getElementById('mapaS10');
            img.classList.toggle('zoomed');
            
            // Kluczowa zmiana: wymuszenie lewej krawędzi przy powiększeniu
            if (img.classList.contains('zoomed')) {
                document.body.style.textAlign = 'left';
            } else {
                document.body.style.textAlign = 'center';
            }
        }
    </script>

</body>
</html>
