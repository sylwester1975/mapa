<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Mapa S10 Płock 2026</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: white;
            /* Usunęliśmy flex, aby pozwolić na naturalne przewijanie strony */
            text-align: center; 
        }
        img {
            max-width: 100%; /* Na start dopasowany do szerokości okna */
            height: auto;
            display: inline-block;
            vertical-align: top; /* Przyklejenie do samej góry */
            cursor: zoom-in;
            transition: transform 0.2s ease;
        }
        /* Klasa po kliknięciu - pełny rozmiar i możliwość przewijania */
        img.zoomed {
            max-width: none;
            display: block; /* Zmiana na block pozwala na swobodny scroll lewo-prawo */
            margin: 0;      /* Dosunięcie do lewej krawędzi przy dużym rozmiarze */
            cursor: zoom-out;
        }
    </style>
</head>
<body>

    <!-- Twoja mapa z funkcją powiększania po kliknięciu -->
    <img src="droga-s10-plock-2026.png" id="mapaS10" onclick="toggleZoom()">

    <script>
        function toggleZoom() {
            const img = document.getElementById('mapaS10');
            img.classList.toggle('zoomed');
            
            // Jeśli obrazek jest powiększony, upewnij się, że strona pozwala na scroll
            if (img.classList.contains('zoomed')) {
                document.body.style.textAlign = 'left';
            } else {
                document.body.style.textAlign = 'center';
            }
        }
    </script>

</body>
</html>
